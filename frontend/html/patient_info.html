<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QInPatients: Информация о пациенте</title>
    <link rel="icon" type="image" href="../img/qinpatients-logo.png">
    <link rel="stylesheet" href="../css/patient_info.css">
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>
    <header class="header" id="header">

    </header>
    <script>
        fetch('../html/header.html')
            .then(response => response.text())
            .then(html => document.getElementById('header').innerHTML = html);
    </script>
    <section class="content">
        <div class="card card-left">
            <div id="patient-info">
                <p><b>Ф. И. О.:</b><br><span id="full-name"></span></p>
                <p><b>Дата рождения:</b><br><span id="birthday"></span> (<span id="age"></span>)</p>
                <p><b>Адрес:</b><br><span id="address"></span></p>
                <p><b>Работа:</b><br><span id="workplace"></span></p>
            </div>
        </div>
        <div class="card card-right">
            <table class="table" id="table-cases">

            </table>
        </div>
    </section>
    <script type="module" src="../js/patient_info.js"></script>
</body>
</html>
